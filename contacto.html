<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto | Rehab Corpus</title>
    <style>
        body { font-family: Arial, sans-serif; }
        form { max-width: 600px; margin: auto; }
        input, textarea { width: 100%; padding: 10px; margin: 10px 0; }
        button { padding: 10px; background-color: #28a745; color: white; border: none; cursor: pointer; }
        .map-container { height: 400px; }
    </style>
</head>
<body>
    <h1>Contacto</h1>
    <form id="contactForm">
        <label for="name">Nombre:</label>
        <input type="text" id="name" name="name" required>

        <label for="email">Correo Electrónico:</label>
        <input type="email" id="email" name="email" required>

        <label for="phone">Teléfono:</label>
        <input type="tel" id="phone" name="phone" pattern="[0-9]{10}" required>

        <label for="message">Mensaje:</label>
        <textarea id="message" name="message" required></textarea>

        <button type="submit">Enviar</button>
    </form>

    <div class="map-container">
        <iframe
            src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3763.011202156334!2d-100.97162398557638!3d22.147838985247664!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x857c8b8c1c1fbec1%3A0x4d165a4b72e08a1e!2sManuel%20J%20Clouthiuer%20%23333%2C%20Col.%20Garita%20de%20jalisco%2C%20CP%2078294%2C%20San%20Luis%20Potos%C3%AD%2C%20SLP%2C%20M%C3%A9xico!5e0!3m2!1ses-419!2sus!4v1685861134577!5m2!1ses-419!2sus"
            width="100%"
            height="100%"
            style="border:0;"
            allowfullscreen=""
            loading="lazy">
        </iframe>
    </div>

    <h2>Información de Contacto</h2>
    <p>Teléfono: <a href="tel:+5214447108351">+52 1 444 710 8351</a></p>
    <p>Correo Electrónico: <a href="mailto:rehab-corpus@outlook.com">rehab-corpus@outlook.com</a></p>
    <p>Horario: Lunes-Viernes 8AM-8PM, Sábado 9AM-2PM</p>

    <h2>Integración de WhatsApp</h2>
    <p>Contáctanos a través de WhatsApp: <a href="https://api.whatsapp.com/send?phone=5214447108351">WhatsApp</a></p>

    <script>
        document.getElementById('contactForm').onsubmit = function(event) {
            event.preventDefault(); // Prevent default form submit
            alert('Formulario enviado exitosamente!'); // Example action
            // Here you can implement the sending logic (e.g., using fetch or axios)
        };
    </script>
</body>
</html>
